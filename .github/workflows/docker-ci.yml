name: Docker Image CI 
on: 
push: 
branches: [ "main" ] 
jobs: 
  build-and-push: 
    runs-on: ubuntu-latest 
    steps: 
      # 1. Pull the latest code 
      - name: Checkout Code 
        [cite_start]uses: actions/checkout@v4 [cite: 11] 
 
      # 2. Log in to Docker Hub using Secrets 
      - name: Login to Docker Hub 
        uses: docker/login-action@v3 
        with: 
          username: ${{ secrets.DOCKERHUB_USERNAME }} 
          password: ${{ secrets.DOCKERHUB_TOKEN }} 
 
      # 3. Build the image and push it to your repository 
      - name: Build and Push 
        uses: docker/build-push-action@v5 
        with: 
          context: . 
          push: true 
          tags: | 
            ${{ secrets.DOCKERHUB_USERNAME }}/my-web-app:latest 
            ${{ secrets.DOCKERHUB_USERNAME }}/my-web-app:${{ github.sha }}